<div class="product-categories-comp">

	<div class="srp-comp-title margin-bottom20">${component.title}</div>

	<sly data-sly-use.product="com.srp.core.models.common.ProductCategoriesDataModel">

		<sly data-sly-use.productTemp="../../../template/srpLabels.html">
			<sly data-sly-call="${productTemp.srpLabels @ srpLabelsObj=product}"></sly>
		</sly>

		<sly data-sly-use.productxfTemp="../../../template/srp-xffragments.html"></sly>
		<sly data-sly-call="${productxfTemp.srpexpf @ srpexpObj=product}"></sly>
        
        <sly data-sly-use.srpTagsTemp="../../../template/srpTags.html"></sly>
      <sly data-sly-call="${srpTagsTemp.tags @ srpTagsObj=product}"></sly>
   </sly>

	</sly>
	<h2>Categories</h2>
	<sly data-sly-test="${product.categories}">

		<sly data-sly-list.categoryList="${product.categories}">
			<h3>Main Category</h3>
			<p>Category icon : ${categoryList.iconPath}</p>
			<p>Category name : ${categoryList.name}</p>
			<h3>Sub Category</h3>
			<table class="srp-table">

				<th class="srp-th">SubCategory Icon</th>
				<th class="srp-th">SubCategory Name</th>


				<sly data-sly-list.subcategoryList="${categoryList.subcategories}">
					<tr>
						<td class="srp-td">${subcategoryList.iconPath}</td>
						<td class="srp-td">${subcategoryList.name}</td>
					</tr>
				</sly>
			</table>



		</sly>

	</sly>

	</sly>

</div>
