<div class="favourites-comp">
    <div class="srp-comp-title margin-bottom20">${component.title}</div>

    <sly data-sly-use.favlist="com.srp.core.models.common.FavouritesListDataModel" />

    <sly data-sly-use.favListTemp="../../template/srpLabels.html">
      <sly data-sly-call="${favListTemp.srpLabels @ srpLabelsObj=favlist}"></sly>
    </sly>
    
    <sly data-sly-use.srpTagsTemp="../../template/srpTags.html"></sly>
         <sly data-sly-call="${srpTagsTemp.tags @ srpTagsObj=favlist}"></sly>
    </sly>
    
    <sly data-sly-use.favLinksTemp="../../template/srpLinks.html">
      <sly data-sly-call="${favLinksTemp.srplinks @ srpLinksObj=favlist}"></sly>
    </sly>
</div>
