<div class="subscription-comp margin-bottom20">

   <div class="srp-comp-title margin-bottom20">${component.title}</div>
   <sly data-sly-use.subscription="com.srp.core.models.common.SubscriptionDataModel" />

   <sly data-sly-use.srpLabelsTemp="../../template/srpLabels.html">
      <sly data-sly-call="${srpLabelsTemp.srpLabels @ srpLabelsObj=subscription}"></sly>
   </sly>
   
   <sly data-sly-use.srpTagsTemp="../../template/srpTags.html"></sly>
      <sly data-sly-call="${srpTagsTemp.tags @ srpTagsObj=subscription}"></sly>
   </sly>

   <table class="srp-table">
      <h2>Subscription Brand Logos</h2>
        <tr>
            <th class="srp-th">Brand Url</th>
            <th class="srp-th">Brand Logo</th>
            <th class="srp-th">Auth Type</th>
            <th class="srp-th">Category</th>
        </tr>

        <sly data-sly-list.subLogo="${subscription.subscriptionLogos}">
            <tr>
                <td class="srp-td">${subLogo.brandLink}</td>
                <td class="srp-td wrap-column">${subLogo.brandLogo}</td>
                <td class="srp-td">${subLogo.authField}</td>
                <td class="srp-td">${subLogo.category}</td>
            </tr>
        </sly>

    </table>

</div>
